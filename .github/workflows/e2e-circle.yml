name: E2E - Post → Circle

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  post-circle-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Local Supabase defaults (deterministic across runs)
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Reset local Supabase (fresh DB + migrations)
        run: |
          set -euo pipefail
          supabase start
          PGURL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"

          # Drop and recreate the public schema only (leave auth/storage intact).
          psql "$PGURL" -v ON_ERROR_STOP=1 <<'SQL'
          DROP SCHEMA IF EXISTS public CASCADE;
          CREATE SCHEMA public;
          GRANT ALL ON SCHEMA public TO postgres;
          GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;
          SQL

          # Pre-create tables that exist in production but were created
          # out-of-band (not in migration history). See file header for context.
          psql "$PGURL" -v ON_ERROR_STOP=1 -f supabase/tests/pre_migration_patch.sql

          # Apply migrations in lexicographic order.
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $f"
            psql "$PGURL" -v ON_ERROR_STOP=1 -f "$f"
          done


      - name: Seed deterministic test data
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f supabase/tests/seed.test.sql

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Run Post → Circle E2E test
        run: bunx vitest run src/test/e2e/postCircle.test.ts

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
